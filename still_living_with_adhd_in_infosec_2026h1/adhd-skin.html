<style>:root{
  /* ADHD talk skin. This deck is light and image-background driven, so --surface
     is rarely visible (images cover the stage); the meaningful token is --ink, the
     dominant body text. Accent/muted capture the deck's blue/grey for any
     foundation elements added later. Per-block blue/orange/red stay literal. */
  --surface:#ffffff; --ink:#212121; --accent:#3c78d8; --muted:#666666;
  --radius:8px; --edge:3px; --shadow:0 10px 30px rgba(0,0,0,.18);
  --pad:0.7em 1em; --gap:0.8em;
  --motion-dur:0.4s; --motion-ease:ease;
  --weight-strong:800; --weight-bold:700; --weight-mid:600;
}</style>
